name: Deploy to InfinityFree

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer

      - name: Install Composer dependencies (no dev, optimized)
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Reset deploy state (force full re-sync, no deletions)
        run: |
          curl -s --ftp-pasv -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            -Q "DELE /htdocs/.ftp-deploy-sync-state.json" \
            "ftp://${{ secrets.FTP_SERVER }}/" || true

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # InfinityFree's web root is usually htdocs/ - adjust if yours differs
          server-dir: ${{ secrets.FTP_SERVER_DIR || '/htdocs/' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/.claude/**
